name: Bug Report
description: Report a bug in Nanostack
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!

  - type: input
    id: agent
    attributes:
      label: Agent
      description: Which AI agent are you using?
      placeholder: "Claude Code 2.1.86"
    validations:
      required: true

  - type: input
    id: skill
    attributes:
      label: Skill
      description: Which skill is affected?
      placeholder: "/review"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run /review on a project with...
        2. The agent does...
        3. Expected vs actual...
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Logs, screenshots, or anything else that helps.
