name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature!

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
      placeholder: "When I use /review, I always have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - /think
        - /nano (planning)
        - /review
        - /qa
        - /security
        - /ship
        - /guard
        - /conductor
        - Setup / install
        - Artifacts / cross-referencing
        - Documentation
        - Extensibility
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
