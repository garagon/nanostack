name: e2e

# Runs ci/e2e-user-flows.sh: real install + sprint + phase gate + legacy
# repair + local mode flows in isolated tmp HOMEs. Slower than the
# unit lint matrix, so it is opt-in (workflow_dispatch). Maintainers
# trigger it before tagging a release or after touching session.sh,
# guard rules, or init-project.sh repair logic.

on:
  workflow_dispatch:

jobs:
  e2e-user-flows:
    name: E2E user flows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: jq is present (smoke check)
        run: jq --version
      - name: Run end-to-end harness
        run: |
          chmod +x ci/e2e-user-flows.sh
          ci/e2e-user-flows.sh

  e2e-delivery-matrix:
    name: E2E delivery matrix (9 cells)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Complement to e2e-user-flows: tests every cell of the
    # profile/run-mode/skip-trio matrix in isolation. Faster than the
    # full user-journey harness, useful as a smoke test before
    # tagging.
    steps:
      - uses: actions/checkout@v4
      - name: jq is present
        run: jq --version
      - name: Run delivery matrix
        run: |
          chmod +x ci/e2e-delivery-matrix.sh
          ci/e2e-delivery-matrix.sh

  e2e-think-flows:
    name: E2E /think vNext flows
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Behavior coverage for the /think vNext spec (PRs #167-#171):
    # structured artifact, profile resolution, autopilot brief gate,
    # preset no-dump regression, search privacy modes. Static lint
    # already covers the structural side (file X says Y); this
    # harness exercises the runtime contract end-to-end.
    steps:
      - uses: actions/checkout@v4
      - name: jq is present
        run: jq --version
      - name: Run /think E2E flows
        run: |
          chmod +x ci/e2e-think-flows.sh
          ci/e2e-think-flows.sh

  e2e-examples:
    name: E2E Examples Library (per-archetype sprint roundtrip)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Examples Library PR 6. check-examples.sh validates the README
    # contract and executable syntax statically; this harness exercises
    # each archetype as a real first-time user would: copy to /tmp,
    # confirm the starting state runs (HTML loads, server replies,
    # script accepts input), run a full sprint of fake-but-valid
    # artifacts, verify resolve.sh + sprint-journal.sh roundtrip.
    # Workflow_dispatch keeps it opt-in; the cells start a real Node
    # HTTP server on a random port and that is heavier than every
    # PR needs.
    steps:
      - uses: actions/checkout@v4
      - name: jq + node + curl available
        run: |
          jq --version
          node --version
          curl --version | head -1
      - name: Run examples library E2E
        run: |
          chmod +x ci/e2e-examples.sh
          ci/e2e-examples.sh

  e2e-think-archetypes:
    name: E2E /think Guided Archetypes v1 (9 cells)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Guided Archetypes v1 PR 5. Static lint covers the alias map,
    # the no-wizard rule, the brief-gate optionality, and the
    # save-site assignments. This harness exercises the runtime
    # contract: each archetype path produces the expected
    # archetype + example_reference, explicit flag wins,
    # ambiguous prompts produce unknown rather than invented
    # archetypes, and the brief gate stays archetype-agnostic
    # under report_only and autopilot.
    steps:
      - uses: actions/checkout@v4
      - name: jq is present
        run: jq --version
      - name: Run /think archetypes E2E
        run: |
          chmod +x ci/e2e-think-archetypes.sh
          ci/e2e-think-archetypes.sh

  e2e-custom-stack-examples:
    name: E2E Custom Stack Examples v1 (compliance-release runtime)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Custom Stack Examples v1 PR 3. Walks the full new-user journey
    # for the compliance-release stack on a real /tmp project: scaffold
    # via bin/create-skill.sh --from, validate via
    # bin/check-custom-skill.sh, save fake core artifacts, run each
    # custom skill's helper, save its artifact, resolve via
    # bin/resolve.sh release-readiness (assert all five upstream
    # keys), compose via release-readiness/bin/summarize.sh, generate
    # journal + analytics + discard, run conductor with the stack's
    # phase_graph, exercise subdir + no-git scaffold paths.
    # 15 cells, 51 assertions.
    steps:
      - uses: actions/checkout@v4
      - name: jq + node available
        run: |
          jq --version
          node --version
      - name: Run custom-stack-examples runtime E2E
        run: |
          chmod +x ci/e2e-custom-stack-examples.sh
          ci/e2e-custom-stack-examples.sh

  e2e-custom-stack:
    name: E2E Custom Stack Framework v1 (15-cell journey)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Custom Stack Framework v1 PR 6. Runs the full new-user journey:
    # bin/create-skill.sh scaffolds a skill, bin/check-custom-skill.sh
    # validates it, the lifecycle scripts surface the custom phase
    # (resolver, journal, analytics, default discard), the conductor
    # accepts a --phases graph that includes it, and the cmd_batch
    # honors the custom skill's concurrency. Lint covers each piece;
    # this harness proves they compose into one workflow.
    steps:
      - uses: actions/checkout@v4
      - name: jq + node available
        run: |
          jq --version
          node --version
      - name: Run custom-stack E2E
        run: |
          chmod +x ci/e2e-custom-stack-flows.sh
          ci/e2e-custom-stack-flows.sh

  e2e-onboarding-flows:
    name: E2E /nano-run vNext flows (9 cells)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # /nano-run vNext PR 5. Exercises the runtime contracts that the
    # static lint matrix describes: profile resolution, capability
    # reads from adapters, legacy detection, the report-only no-write
    # invariant, and the setup artifact roundtrip. Static lint owns
    # "the field is mentioned"; this harness owns "the contract works
    # end-to-end on a real /tmp project".
    steps:
      - uses: actions/checkout@v4
      - name: jq is present
        run: jq --version
      - name: Run /nano-run E2E flows
        run: |
          chmod +x ci/e2e-onboarding-flows.sh
          ci/e2e-onboarding-flows.sh
